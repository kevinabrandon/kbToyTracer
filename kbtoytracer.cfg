# kbToyTracer render settings (key value, one per line, '#' = comment)

# image resolution
width   400
height  300

# anti-aliasing (NxN samples per pixel)
enable_supersample      1
numSampsLarge           2
enable_sochastic_super  0
enable_adaptive_super   0

# depth of field  (aperture 'lensRadius' + 'focalDist' come from the scene file)
enable_camera_lens      0
lensSamps               6

# max reflection / refraction bounces
numBounces              6

# shading toggles
enable_shading          1
enable_specular         1
enable_shadows          1
enable_reflection       1
enable_refraction       1

# global illumination (off = classic point-light shading)
enable_indirect_light   0
enable_stratify_light   0
enable_area_light       0
