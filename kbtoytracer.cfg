# kbToyTracer render settings (key value, one per line, '#' = comment)
# Every key the parser understands (kbConfig.cpp) is listed below with its
# code default shown in the comment. Booleans: 1/t/y = on, anything else = off.

# image resolution
width  512                         # image width in pixels           (default 320)
height 512                         # image height in pixels          (default 240)

# anti-aliasing (only one AA mode is active; priority: adaptive > supersample)
enable_supersample      1          # uniform NxN supersampling       (default on)
numSampsLarge           2          # the N: NxN rays per pixel       (default 2)
enable_sochastic_super  0          # jitter the grid; needs supersample on (default off)
enable_adaptive_super   0          # adaptive corner-subdivision AA  (default off)
numSampsSmall           2          # (currently unused / dead code)  (default 2)

# depth of field  (aperture 'lensRadius' + 'focalDist' come from the scene file)
enable_camera_lens      0          # thin-lens depth of field        (default off)
lensSamps               6          # NxN rays through the aperture   (default 6)

# max reflection / refraction bounces
numBounces              6          # max ray-tree depth              (default 6)

# when a reflection/refraction ray escapes the scene, return the background
# color instead of black (1 = original 2004/5 look)
bg_escaped_rays         0          #                                 (default off)

# shading toggles
enable_shading          1          # master shading switch           (default on)
enable_specular         1          # specular highlights             (default on)
enable_shadows          1          # cast shadow rays                (default on)
enable_transparent_shadows 0       # glass casts lighter shadows     (default off)
enable_reflection       1          # trace reflection rays           (default on)
enable_refraction       1          # trace refraction rays           (default on)

# global illumination (off = classic point-light shading)
enable_indirect_light   0          # one-bounce indirect light       (default off)
enable_stratify_light   0          # stratify indirect samples       (default off)
enable_area_light       0          # Monte-Carlo area-light shadows  (default off)
dlSamp                  3          # dlSamp x dlSamp shadow samples per area light, clamped 1..8 (default 3)
