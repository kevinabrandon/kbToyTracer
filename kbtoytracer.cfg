# kbToyTracer render settings (key value, one per line, '#' = comment)
# Every key the parser understands (kbConfig.cpp) is listed below with its
# code default shown in the comment. Booleans: 1/t/y = on, anything else = off.
#
# The scene decides WHAT is rendered (lights, lens, materials); this file
# decides HOW WELL (resolution, samples, bounces). Depth of field and soft
# shadows activate automatically when the scene has a lens / an area light;
# the sample counts below control their quality (0 or 1 = off / hard).
#
# Any of these can be overridden per run:  kbtoytracer scene.sdf --set key=value

# image resolution
width  512                         # image width in pixels           (default 512)
height 512                         # image height in pixels          (default 512)

# anti-aliasing
aa_samples   2                     # NxN rays per pixel; 1 = single ray  (default 2)
aa_jitter    0                     # jitter the AA grid              (default off)
aa_adaptive  0                     # corner-test first, refine busy pixels (default off)
aa_threshold 0.01                  # corner difference that triggers refinement

# depth of field ('lensRadius' + 'focalDist' come from the scene file;
# DoF happens whenever the scene defines a lens)
dof_samples  3                     # NxN lens rays per AA sample; 0 = off  (default 3)

# soft shadows (any emitter with area -- sphere, quad -- is an area light)
shadow_samples 3                   # NxN shadow rays per area light; 1 = hard (default 3)

# max reflection / refraction bounces
max_bounces  6                     # max ray-tree depth              (default 6)

# random seed: 0 = different every run; nonzero = reproducible renders
# (use a fixed seed for animation frames so the noise doesn't flicker)
seed 0

# when a reflection/refraction ray escapes the scene, return the background
# color instead of black (1 = original 2004/5 look)
bg_escaped_rays 0                  #                                 (default off)

# shading kill-switches (for debugging/teaching; normally all on)
enable_shading          1          # master shading switch           (default on)
enable_specular         1          # specular highlights             (default on)
enable_shadows          1          # cast shadow rays                (default on)
enable_transparent_shadows 0       # glass casts lighter shadows     (default off)
enable_reflection       1          # trace reflection rays           (default on)
enable_refraction       1          # trace refraction rays           (default on)

# experimental global illumination
enable_indirect_light   0          # one-bounce indirect light       (default off)
enable_stratify_light   0          # stratify indirect samples       (default off)
